<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mainland</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a1a24 0%, #050508 100%);
            color: #e0e0e0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 100%;
            max-width: 500px;
            height: 100px;
            object-fit: cover;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
        }

        .description {
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            line-height: 1.5;
            margin-bottom: 40px;
            color: #b0b0b0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
            padding: 0 10px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 20px;
            text-decoration: none;
            color: #ffffff;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .link-btn i {
            font-size: 1.3rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 15px;
            }
            .logo {
                max-width: 90%;
            }
            .description {
                font-size: 0.95rem;
                margin-bottom: 30px;
            }
            .links-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .link-btn {
                padding: 18px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <img src="logo_transparent.png" alt="Mainland Logo" class="logo">

    <p class="description">
        Enter a cooperative medieval realm, forge alliances, lead armies, and engage in epic battles. Shape history with dynamic politics, or test your mettle against others in fierce player-vs-player combat.
    </p>

    <div class="links-grid">
        <a href="https://store.steampowered.com/app/2304360/Mainland/" target="_blank" class="link-btn">
            <i class="fa-brands fa-steam"></i> Steam
        </a>
        <a href="https://discord.gg/ZkU7gN6ZMt" target="_blank" class="link-btn">
            <i class="fa-brands fa-discord"></i> Discord
        </a>
        <a href="#" target="_blank" class="link-btn">
            <i class="fa-brands fa-instagram"></i> Instagram
        </a>
        <a href="#" target="_blank" class="link-btn">
            <i class="fa-brands fa-tiktok"></i> TikTok
        </a>
    </div>
</div>
</body>
</html>
